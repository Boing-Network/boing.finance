version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: mochi-postgres
    environment:
      POSTGRES_DB: mochi_db
      POSTGRES_USER: mochi_user
      POSTGRES_PASSWORD: mochi_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mochi-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mochi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mochi-network
    restart: unless-stopped

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mochi-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://mochi_user:mochi_password@postgres:5432/mochi_db
      REDIS_URL: redis://redis:6379
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL}
      BSC_RPC_URL: ${BSC_RPC_URL}
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - mochi-network
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mochi-frontend
    environment:
      REACT_APP_BACKEND_URL: http://backend:3001
      REACT_APP_ENV: development
      REACT_APP_ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL}
      REACT_APP_POLYGON_RPC_URL: ${POLYGON_RPC_URL}
      REACT_APP_BSC_RPC_URL: ${BSC_RPC_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mochi-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mochi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - mochi-network
    restart: unless-stopped

  # Blockchain Node (Optional - for local development)
  blockchain:
    image: ethereum/client-go:stable
    container_name: mochi-blockchain
    command: >
      --datadir /var/lib/ethereum
      --http
      --http.addr 0.0.0.0
      --http.port 8545
      --http.corsdomain "*"
      --http.api "eth,net,web3,personal,miner"
      --allow-insecure-unlock
      --unlock 0x742d35Cc6634C0532925a3b8D4C9db96C4b4d8b6
      --password /var/lib/ethereum/password.txt
      --mine
      --miner.threads 1
      --networkid 1337
      --nodiscover
    ports:
      - "8545:8545"
    volumes:
      - blockchain_data:/var/lib/ethereum
      - ./blockchain/password.txt:/var/lib/ethereum/password.txt
    networks:
      - mochi-network
    profiles:
      - development

  # Monitoring Stack (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: mochi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - mochi-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: mochi-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - mochi-network
    profiles:
      - monitoring
    depends_on:
      - prometheus

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  blockchain_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  mochi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 