# Builds off-chain native DEX **stats** JSON (pools + AMM log scan + history). This workflow does **not** deploy
# the `boing-native-dex-indexer` Worker (that lives in boing.network). It uploads a GitHub artifact and optionally
# pushes JSON to R2. Consumers: same-origin **Pages** `GET /api/native-dex-indexer-stats`, a public URL to that
# JSON, or the Worker’s **`GET /stats`** when you point `REACT_APP_BOING_NATIVE_DEX_INDEXER_STATS_URL` there.
# **D1 directory** (`/v1/directory/*`) is served by the Worker only — set `REACT_APP_BOING_NATIVE_DEX_DIRECTORY_BASE_URL`
# to the Worker origin (see `workers/native-dex-indexer` README in boing.network).
name: Native DEX indexer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - staging
    paths:
      - 'frontend/env/github-native-dex-indexer.env'
      - 'frontend/indexer/**'
      - 'frontend/scripts/native-dex-indexer-cli.mjs'
      - 'frontend/scripts/run-with-env-file.mjs'
      - 'frontend/scripts/postinstall-boing-sdk.mjs'
      - 'frontend/functions/api/native-dex-indexer-stats.js'
      - 'frontend/functions/lib/**'
      - '.github/workflows/native-dex-indexer.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: Boing-Network/boing.network
          path: boing.network

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: "Install and build boing-sdk (linked package; dist must include indexer helpers)"
        working-directory: boing.network/boing-sdk
        run: npm install --no-audit --no-fund && npm run build

      - name: Verify boing-sdk indexer dist
        run: test -f boing.network/boing-sdk/dist/nativeDexIndexerStats.js

      - uses: actions/cache@v4
        id: indexer-state
        with:
          path: frontend/.native-dex-indexer-state.json
          key: native-dex-indexer-state-v1-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            native-dex-indexer-state-v1-

      - name: Run indexer
        working-directory: frontend
        env:
          NATIVE_DEX_INDEXER_STATE_PATH: .native-dex-indexer-state.json
          NATIVE_DEX_INDEXER_OUT_PATH: ${{ runner.temp }}/native-dex-indexer-stats.json
          # Optional JSON overrides (large payloads): keep in GitHub repo Variables if you prefer.
          NATIVE_DEX_INDEXER_TOKEN_USD_JSON: ${{ vars.NATIVE_DEX_INDEXER_TOKEN_USD_JSON }}
          NATIVE_DEX_INDEXER_TOKEN_DIRECTORY_JSON: ${{ vars.NATIVE_DEX_INDEXER_TOKEN_DIRECTORY_JSON }}
        run: node scripts/run-with-env-file.mjs env/github-native-dex-indexer.env -- node scripts/native-dex-indexer-cli.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: native-dex-indexer-stats
          path: ${{ runner.temp }}/native-dex-indexer-stats.json
          retention-days: 14

      - name: Summary
        if: success()
        run: |
          echo "## Native DEX indexer (off-chain JSON)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact:** \`native-dex-indexer-stats\` (download from this run’s Artifacts)." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Worker vs Pages:** D1 directory API is on the **native-dex-indexer Worker** (\`/v1/directory/*\`). Stats JSON may come from this CI job (artifact/R2), from **Pages** \`/api/native-dex-indexer-stats\`, or from the Worker \`/stats\` — keep \`REACT_APP_BOING_NATIVE_DEX_INDEXER_STATS_URL\` aligned with what you actually host." >> "$GITHUB_STEP_SUMMARY"
          echo "- **R2 upload:** runs when \`NATIVE_DEX_INDEXER_R2_BUCKET\` + \`NATIVE_DEX_INDEXER_R2_OBJECT_KEY\` are set; uses \`CLOUDFLARE_API_TOKEN\` + \`CLOUDFLARE_ACCOUNT_ID\` (same secrets as frontend Pages deploy)." >> "$GITHUB_STEP_SUMMARY"

  # Optional: create bucket once (logged-in Wrangler): wrangler r2 bucket create boing-finance-native-dex-stats
  # Then set repo variables NATIVE_DEX_INDEXER_R2_BUCKET=boing-finance-native-dex-stats and NATIVE_DEX_INDEXER_R2_OBJECT_KEY=native-dex-indexer-stats.json (or your key).
  # Requires secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID (same as frontend deploy).
  upload-r2:
    name: Upload indexer JSON to R2
    needs: build
    if: ${{ vars.NATIVE_DEX_INDEXER_R2_BUCKET != '' && vars.NATIVE_DEX_INDEXER_R2_OBJECT_KEY != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: native-dex-indexer-stats
          path: indexer-out

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Put object to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put "${{ vars.NATIVE_DEX_INDEXER_R2_BUCKET }}/${{ vars.NATIVE_DEX_INDEXER_R2_OBJECT_KEY }}" \
            -f "indexer-out/native-dex-indexer-stats.json" \
            --remote \
            --content-type application/json
