<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2e3a6a"/>
      <stop offset="100%" stop-color="#0b1426"/>
    </radialGradient>
    <radialGradient id="boing" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0e7ef"/>
    </radialGradient>
    <radialGradient id="visor" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#b3e0ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#circleClip)">
    <!-- Space background -->
    <rect width="200" height="200" fill="url(#bg)"/>
    <!-- Stars and planets (animated stars) -->
    <circle cx="30" cy="40" r="1.2" fill="#fff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="170" cy="60" r="1.5" fill="#ffe066">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="150" r="2" fill="#bae6fd">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="30" r="1.2" fill="#fca5a5">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="180" r="1.5" fill="#fcd34d">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Astronaut shadow -->
    <ellipse cx="100" cy="175" rx="28" ry="8" fill="#1e293b" opacity="0.13"/>
    <!-- Suit body (puffy, segmented) -->
    <ellipse cx="100" cy="140" rx="28" ry="24" fill="#e0e7ef" stroke="#bfc9d9" stroke-width="2"/>
    <!-- Suit details: buttons and patches -->
    <circle cx="100" cy="140" r="5" fill="#bae6fd" stroke="#7dd3fc" stroke-width="1.5"/>
    <circle cx="90" cy="140" r="2" fill="#fca5a5"/>
    <circle cx="110" cy="140" r="2" fill="#fcd34d"/>
    <rect x="95" y="150" width="10" height="5" rx="2" fill="#7dd3fc" stroke="#60a5fa" stroke-width="1"/>
    <!-- Tubes on suit -->
    <path d="M 120 150 Q 130 155 120 160" stroke="#7dd3fc" stroke-width="2" fill="none"/>
    <path d="M 80 150 Q 70 155 80 160" stroke="#7dd3fc" stroke-width="2" fill="none"/>
    <!-- Arms (closer to body) -->
    <ellipse cx="78" cy="135" rx="7" ry="13" fill="#e0e7ef" stroke="#bfc9d9" stroke-width="2"/>
    <ellipse cx="122" cy="135" rx="7" ry="13" fill="#e0e7ef" stroke="#bfc9d9" stroke-width="2"/>
    <!-- Gloves -->
    <ellipse cx="72" cy="147" rx="6" ry="6" fill="#f8fafc" stroke="#bfc9d9" stroke-width="2"/>
    <ellipse cx="128" cy="147" rx="6" ry="6" fill="#f8fafc" stroke="#bfc9d9" stroke-width="2"/>
    <!-- Legs (short, segmented, puffy) -->
    <ellipse cx="88" cy="165" rx="7" ry="12" fill="#e0e7ef" stroke="#bfc9d9" stroke-width="2"/>
    <ellipse cx="112" cy="165" rx="7" ry="12" fill="#e0e7ef" stroke="#bfc9d9" stroke-width="2"/>
    <!-- Boots -->
    <ellipse cx="88" cy="180" rx="8" ry="4" fill="#a5b4fc"/>
    <ellipse cx="112" cy="180" rx="8" ry="4" fill="#a5b4fc"/>
    <!-- Oxygen tank (back) -->
    <ellipse cx="100" cy="150" rx="10" ry="8" fill="#bae6fd" stroke="#7dd3fc" stroke-width="1.5"/>
    <!-- Helmet outer rim (white) -->
    <ellipse cx="100" cy="85" rx="48" ry="44" fill="#fff" stroke="#bfc9d9" stroke-width="3"/>
    <!-- Helmet visor (blue) -->
    <ellipse cx="100" cy="85" rx="42" ry="38" fill="url(#visor)" stroke="#7dd3fc" stroke-width="3"/>
    <!-- Boing head (large, round, inside helmet) -->
    <ellipse cx="100" cy="90" rx="32" ry="30" fill="url(#boing)" stroke="#bfc9d9" stroke-width="2"/>
    <!-- Face: big cute eyes, no mouth -->
    <ellipse cx="88" cy="95" rx="5" ry="5" fill="#60a5fa"/>
    <ellipse cx="112" cy="95" rx="5" ry="5" fill="#60a5fa"/>
    <ellipse cx="88" cy="94" rx="1.2" ry="2" fill="#fff" opacity="0.7"/>
    <ellipse cx="112" cy="94" rx="1.2" ry="2" fill="#fff" opacity="0.7"/>
    <!-- Helmet shine -->
    <ellipse cx="85" cy="75" rx="12" ry="6" fill="#fff" opacity="0.18"/>
  </g>
</svg> 