name = "boing-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Environment variables
[vars]
NODE_ENV = "development"
FRONTEND_URL = "http://localhost:3000"

[env.production]
name = "boing-api-prod"

[env.production.vars]
NODE_ENV = "production"
FRONTEND_URL = "https://boing.finance"

[env.staging]
name = "boing-api-staging"

[env.staging.vars]
NODE_ENV = "staging"
FRONTEND_URL = "https://staging.boing.finance"

# D1 Database - Updated with actual database ID
[[d1_databases]]
binding = "DB"
database_name = "boing-database"
database_id = "fad0eff6-b010-4310-af96-0b68fc5ebab5"

# R2 Bucket for file storage
[[r2_buckets]]
binding = "BOING_STORAGE"
bucket_name = "boing-storage"
preview_bucket_name = "boing-storage-preview"

# Environment-specific D1 databases
[env.production.d1_databases]
binding = "DB"
database_name = "boing-database-prod"
database_id = "fad0eff6-b010-4310-af96-0b68fc5ebab5"

[env.staging.d1_databases]
binding = "DB"
database_name = "boing-database-staging"
database_id = "fad0eff6-b010-4310-af96-0b68fc5ebab5"

# KV Namespace for caching (optional)
# Run: wrangler kv:namespace create "BOING_CACHE"
# [[kv_namespaces]]
# binding = "CACHE"
# id = "" # Add your KV namespace ID here
# preview_id = "" # Add your KV preview namespace ID here

# Secrets (set via wrangler secret put)
# ETHEREUM_RPC_URL
# POLYGON_RPC_URL
# BSC_RPC_URL
# SEPOLIA_RPC_URL
# ETHERSCAN_API_KEY
# JWT_SECRET

# Cron triggers for background jobs (optional)
# [triggers]
# crons = ["0 */6 * * *"] # Run every 6 hours

# Limits - Removed CPU limits for Free plan compatibility
# [limits]
# cpu_ms = 50 